name: game_turbo_pro_mobile
description: App móvil para optimizar el rendimiento de tu teléfono

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI y Diseño
  cupertino_icons: ^1.0.2
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  
  # Estado y Lógica
  provider: ^6.0.0
  get: ^4.6.5
  
  # Datos
  sqflite: ^2.3.0
  shared_preferences: ^2.2.0
  
  # Sistema
  device_info_plus: ^10.1.0
  battery_plus: ^1.6.0
  android_intent_plus: ^4.1.0
  permission_handler: ^11.4.4
  
  # Gráficos
  fl_chart: ^0.65.0
  lottie: ^2.7.0
  
  # Utilidades
  intl: ^0.19.0
  http: ^1.1.0
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  
  fonts:
    - family: Segoe
      fonts:
        - asset: assets/fonts/SegoeUI-Regular.ttf
        - asset: assets/fonts/SegoeUI-Bold.ttf
          weight: 700
